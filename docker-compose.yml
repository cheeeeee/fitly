# Docker Compose for Fitly — uses FITLY_MEM_LIMIT from .env (set by init-host.sh)
# The mem_limit prevents the container from consuming all host RAM and causing
# system-wide OOM lockup (SSH freeze, kernel swap thrash).

version: "3.8"

services:
  fitly:
    image: ghcr.io/cheeeeee/fitly:latest
    build: .
    container_name: fitly
    restart: unless-stopped
    ports:
      - "${PORT:-80}:${PORT:-80}"
    volumes:
      - ./config:/app/config
    env_file:
      - .env
    # Memory fence: init-host.sh calculates FITLY_MEM_LIMIT based on host RAM
    # and injects it into .env. This ensures Docker kills the container (OOM)
    # rather than letting it swap-thrash the entire host.
    mem_limit: ${FITLY_MEM_LIMIT:-512M}
    memswap_limit: ${FITLY_MEM_LIMIT:-512M}  # Equal to mem_limit = no swap
